name: AWS RDS Deployment
on:
  push:
    branches: [ main ] # This triggers the "bridge" whenever you push to main

permissions:
  id-token: write # Required for the OIDC handshake
  contents: read

jobs:
  deploy-rds:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Pull your code into the runner
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 2: Use the OIDC Bridge to login to AWS
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1 # Change this if your VPC is in a different region
          role-session-name: GitHubActionsDeployment

      # Step 3: Send your template to CloudFormation
      - name: Deploy CloudFormation Stack
        uses: aws-actions/aws-cloudformation-github-deploy@v1
        with:
          name: rds-postgresql-stack
          template: rds-postgresql-yaml-template # Ensure this matches your file name!
          no-fail-on-empty-changeset: "1"
          parameter-overrides: >-
            VPCID=${{ vars.VPC_ID }},
            Subnet1=${{ vars.DB_SUBNET_A }},
            Subnet2=${{ vars.DB_SUBNET_B }},
            DBPassword=${{ secrets.POSTGRESQLDB_PASSWORD }}

